<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/lnv-logo.svg" />
    <!-- No manifest here — the main ERP isn't a PWA. The Parent Portal's
         manifest gets injected dynamically only on portal routes (see
         portalPwa.js), never globally, so "Install" from anywhere on the
         main app can't be hijacked into the Parent Portal's branding
         again like it just was. -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="LNV ERP - Manufacturing ERP for LNV Manufacturing Pvt. Ltd." />
    <title>LNV ERP</title>
    <!-- Tahoma system font + Tabler icons font -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
    <style>
      /* Tahoma for all text — but NOT icon fonts */
      body, input, select, textarea, button:not(.ti):not([class*='ti-']) {
        font-family: 'Tahoma', 'Verdana', sans-serif;
      }
      /* Keep icon font for Tabler icons */
      .ti, [class*=' ti-'], [class^='ti-'] {
        font-family: 'tabler-icons' !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
